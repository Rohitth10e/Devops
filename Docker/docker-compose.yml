version: "3.8"

services:
  mongo:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret

    ports:
      - "27017:27017"
    networks:
      - demo-network

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    networks:
      - demo-network
    environment:
      - MONGO_URI=mongodb://mongo:27017/test_flask

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    networks:
      - demo-network
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend

networks:
  demo-network: {}